<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<style>
body { background-color: #f4f6f9; }
.navbar { background: #343a40; }
.status-pending { color: #d9534f; font-weight: bold; }
.status-completed { color: #28a745; font-weight: bold; }
.status-approved { color: #ffc107; font-weight: bold; }
.appointment-card {
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <a class="btn btn-light" href="index.html">⬅ Back</a>
    <span class="navbar-brand mx-auto">Patient Dashboard</span>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</nav>

<div class="container mt-4">

<h3>Welcome, <span id="patientNameDisplay"></span></h3>
<p>Your appointments will appear below. Status updates automatically.</p>

<div id="appointmentsContainer"></div>

</div>

<script>
// --- LOGIN CHECK ---
let patientName = localStorage.getItem("loggedInPatient");
if(!patientName){
    patientName = prompt("Enter your name to view your appointments:");
    if(patientName){
        localStorage.setItem("loggedInPatient", patientName);
    } else {
        alert("Name required to view dashboard!");
        window.location.href = "index.html";
    }
}
document.getElementById("patientNameDisplay").textContent = patientName;

// --- LOGOUT ---
function logout(){
    localStorage.removeItem("loggedInPatient");
    window.location.href = "index.html";
}

// --- RENDER APPOINTMENTS ---
function renderAppointmentsForPatient(){
    const container = document.getElementById("appointmentsContainer");
    let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

    // Filter only this patient's appointments
    let patientAppointments = appointments.filter(app => app.name === patientName);
    container.innerHTML = "";

    if(patientAppointments.length === 0){
        container.innerHTML = "<p>No appointments yet.</p>";
    }

    patientAppointments.forEach(app => {
        const card = document.createElement("div");
        card.className = "appointment-card";
        card.innerHTML = `
            <p><strong>Doctor:</strong> ${app.doctor}</p>
            <p><strong>Date:</strong> ${app.date}</p>
            <p><strong>Time:</strong> ${app.time}</p>
            <p><strong>Status:</strong> <span class="status-${app.status.toLowerCase()}">${app.status}</span></p>
            ${app.adminMessage ? `<p><strong>Admin Message:</strong> ${app.adminMessage}</p>` : ""}
        `;
        container.appendChild(card);
    });
}

// --- INITIAL LOAD ---
renderAppointmentsForPatient();

// --- AUTO-REFRESH EVERY 5 SECONDS ---
setInterval(renderAppointmentsForPatient, 5000);

</script>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
