<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<style>
body { background-color: #f4f6f9; }
.navbar { background: #343a40; }
.status-pending { color: #d9534f; font-weight: bold; }
.status-completed { color: #28a745; font-weight: bold; }
.status-approved { color: #ffc107; font-weight: bold; }
.status-cancelled { color: #6c757d; font-weight: bold; }

.appointment-card {
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
    <a class="btn btn-light" href="index.html">⬅ Back</a>
    <span class="navbar-brand mx-auto">Patient Dashboard</span>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</nav>

<div class="container mt-4">

<h3>Welcome, <span id="patientNameDisplay"></span></h3>
<p>Your appointments will appear below. Status updates automatically.</p>

<div id="appointmentsContainer"></div>

</div>

<script>

// LOGIN
let patientName = localStorage.getItem("loggedInPatient");

if(!patientName){
    patientName = prompt("Enter your name to view your appointments:");
    if(patientName){
        localStorage.setItem("loggedInPatient", patientName);
    } else {
        alert("Name required!");
        window.location.href = "index.html";
    }
}

document.getElementById("patientNameDisplay").textContent = patientName;

// LOGOUT
function logout(){
    localStorage.removeItem("loggedInPatient");
    window.location.href = "index.html";
}

// CANCEL APPOINTMENT ⭐ NEW FEATURE
function cancelAppointment(index){
    let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

    if(confirm("Do you want to cancel this appointment?")){
        appointments[index].status = "Cancelled";
        localStorage.setItem("appointments", JSON.stringify(appointments));
        renderAppointmentsForPatient();
    }
}

// RENDER
function renderAppointmentsForPatient(){

    const container = document.getElementById("appointmentsContainer");
    let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

    container.innerHTML = "";

    let patientAppointments = appointments
        .map((app, index) => ({ ...app, index }))
        .filter(app => app.name === patientName);

    if(patientAppointments.length === 0){
        container.innerHTML = "<p>No appointments yet.</p>";
        return;
    }

    patientAppointments.forEach(app => {

        const card = document.createElement("div");
        card.className = "appointment-card";

        card.innerHTML = `
            <p><strong>Doctor:</strong> ${app.doctor}</p>
            <p><strong>Date:</strong> ${app.date}</p>
            <p><strong>Time:</strong> ${app.time}</p>

            <p><strong>Status:</strong> 
                <span class="status-${app.status.toLowerCase()}">${app.status}</span>
            </p>

            ${app.adminMessage ? `<p><strong>Admin Message:</strong> ${app.adminMessage}</p>` : ""}

            ${app.status !== "Cancelled" && app.status !== "Completed"
                ? `<button class="btn btn-danger btn-sm" onclick="cancelAppointment(${app.index})">
                    Cancel Appointment
                   </button>`
                : ""
            }
        `;

        container.appendChild(card);
    });
}

// AUTO REFRESH
renderAppointmentsForPatient();
setInterval(renderAppointmentsForPatient, 5000);

</script>

</body>
</html>
