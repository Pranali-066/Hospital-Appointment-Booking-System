<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<style>
body {
    background: #f8f8f8;
    font-family: 'Roboto', sans-serif;
}

/* Navbar */
.navbar {
    background: #f57c7c;
}
.navbar .navbar-brand, .navbar .nav-link {
    color: #fff;
}
.navbar .nav-link:hover { color: #000; }

/* Centered login card */
.login-container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-card {
    background: #fff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}
.login-card h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #f57c7c;
}
.login-card input {
    margin-bottom: 15px;
    height: 45px;
    border-radius: 5px;
    border: 1px solid #ddd;
    padding: 0 10px;
    width: 100%;
}
.login-card button {
    width: 100%;
    background: #f57c7c;
    border: none;
    color: #fff;
    font-size: 16px;
    padding: 10px;
    border-radius: 5px;
    transition: 0.3s;
}
.login-card button:hover { background: #e05555; }
.login-card .text-center a {
    color: #f57c7c;
    text-decoration: none;
}
.login-card .text-center a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Hospital System</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="specialties.html">Specialties</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Login Form -->
<div class="login-container">
    <div class="login-card">
        <h2>Admin Login</h2>
        <form id="adminLoginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="text-center mt-3">
            <a href="index.html">Back to Home</a>
        </p>
    </div>
</div>

<!-- JS Scripts -->
<script>
// Frontend-only login
document.getElementById("adminLoginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // Simulated admin credentials
    if(username === "admin" && password === "admin123"){
        localStorage.setItem("adminLoggedIn", "true");
        window.location.href = "admin-dashboard.html"; // redirect to dashboard
    } else {
        alert("Invalid username or password");
    }
});
</script>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
