<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Appointment Booking</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<style>
body{
    background:#f5f5f5;
}

.card{
    border-radius:10px;
}

.slot.active{
    background:green;
    color:white;
}

.slot{
    min-width:80px;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<a href="index.html" class="btn btn-light">⬅ Back to Home</a>
<span class="navbar-brand mx-auto">Hospital Booking</span>
</nav>

<div class="container mt-5">

<h3 class="text-center mb-4">Book Appointment</h3>

<div class="row justify-content-center">
<div class="col-md-7">

<div class="card p-4 shadow">

<form id="appointmentForm">

<input type="text" id="name" class="form-control mb-3"
placeholder="Enter Patient Name" required>

<select id="specialty" class="form-control mb-3" required>
<option value="">Select Specialty</option>
<option value="cardiology">Cardiology</option>
<option value="neurology">Neurology</option>
<option value="orthopedics">Orthopedics</option>
<option value="pediatrics">Pediatrics</option>
</select>

<select id="doctor" class="form-control mb-3" required>
<option value="">Select Doctor</option>
</select>

<input type="date" id="date" class="form-control mb-3" required>

<div id="slots"></div>

<button class="btn btn-success btn-block mt-3">
Book Appointment
</button>

</form>

</div>

</div>
</div>
</div>

<script>

// DOCTORS
const doctors = {
cardiology:["Dr. Smith","Dr. Johnson"],
neurology:["Dr. Brown","Dr. Davis"],
orthopedics:["Dr. Wilson","Dr. Lee"],
pediatrics:["Dr. Taylor","Dr. Anderson"]
};

// SLOTS
const slotsData = {

"Dr. Smith":["9AM","10AM","11AM","12PM","2PM","3PM","4PM","5PM","6PM","7PM","8PM","9PM"],

"Dr. Johnson":["10AM","11AM","1PM","2PM","3PM","4PM","5PM","6PM","7PM","8PM"],

"Dr. Brown":["9:30AM","10:30AM","11:30AM","1:30PM","2:30PM","4:30PM","6:30PM","8:30PM"],

"Dr. Davis":["12PM","1PM","2PM","3PM","5PM","6PM","7PM","8PM"],

"Dr. Wilson":["9AM","10AM","11AM","4PM","6PM","7PM","9PM"],

"Dr. Lee":["12PM","1PM","2PM","5PM","6PM","8PM"],

"Dr. Taylor":["9:30AM","10:30AM","3PM","5PM","7PM"],

"Dr. Anderson":["11:30AM","12:30PM","4PM","6PM","8PM"]

};

// ELEMENTS
const specialty = document.getElementById("specialty");
const doctor = document.getElementById("doctor");
const dateInput = document.getElementById("date");
const slots = document.getElementById("slots");

// MIN DATE TODAY
const today = new Date().toISOString().split("T")[0];
dateInput.min = today;

// LOAD DOCTORS
specialty.addEventListener("change", function(){

doctor.innerHTML = '<option value="">Select Doctor</option>';
slots.innerHTML = "";

doctors[this.value].forEach(d=>{
let opt = document.createElement("option");
opt.value = d;
opt.textContent = d;
doctor.appendChild(opt);
});

});

// LOAD SLOTS (NO TIME FILTER = ALL VISIBLE)
doctor.addEventListener("change", loadSlots);
dateInput.addEventListener("change", loadSlots);

function loadSlots(){

const d = doctor.value;
const date = dateInput.value;

slots.innerHTML = "";

if(!d || !date){
slots.innerHTML = "<p class='text-danger'>Select doctor and date</p>";
return;
}

let data = JSON.parse(localStorage.getItem("appointments")) || [];

slotsData[d].forEach(s=>{

let btn = document.createElement("button");
btn.type = "button";
btn.className = "btn btn-outline-primary m-1 slot";
btn.textContent = s;

// disable booked slot
if(data.some(a =>
a.doctor === d &&
a.date === date &&
a.time === s
)){
btn.disabled = true;
btn.classList.remove("btn-outline-primary");
btn.classList.add("btn-danger");
}

// select slot
btn.onclick = function(){
document.querySelectorAll(".slot")
.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
};

slots.appendChild(btn);

});

}

// BOOK APPOINTMENT
document.getElementById("appointmentForm")
.addEventListener("submit", function(e){

e.preventDefault();

const name = document.getElementById("name").value;
const d = doctor.value;
const date = dateInput.value;
const slot = document.querySelector(".slot.active");

if(!name || !d || !date || !slot){
alert("Please fill all fields");
return;
}

let data = JSON.parse(localStorage.getItem("appointments")) || [];

data.push({
name:name,
doctor:d,
date:date,
time:slot.textContent
});

localStorage.setItem("appointments", JSON.stringify(data));

alert("Appointment Booked Successfully!");

document.getElementById("appointmentForm").reset();
slots.innerHTML = "";

});

</script>

</body>
</html>
