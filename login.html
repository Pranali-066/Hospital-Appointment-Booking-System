<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Hospital Appointment Booking</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<!-- Back Button -->
<a href="index.html" class="btn btn-secondary mb-3">⬅ Back to Home</a>

<div class="row justify-content-center">
<div class="col-md-5">

<div class="card shadow">

<div class="card-header text-center bg-primary text-white">
<h4>Login</h4>
</div>

<div class="card-body">

<form id="loginForm">

<div class="form-group">
<label>Email</label>
<input type="email" id="email" class="form-control" placeholder="Enter Email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" class="form-control" placeholder="Enter Password" required>
</div>

<button type="submit" class="btn btn-primary btn-block">
Sign In
</button>

<div class="text-center mt-3">
Don't have account? <a href="register.html">Register Here</a>
</div>

</form>

</div>
</div>

</div>
</div>
</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

let users = JSON.parse(localStorage.getItem("users")) || [];

if(users.length === 0){
alert("No users registered. Please register first.");
return;
}

let validUser = users.find(function(user){
return user.email === email && user.password === password;
});

if(validUser){

// ✅ SAVE LOGIN (IMPORTANT)
localStorage.setItem("loggedInUser", validUser.email);

alert("Login Successful! Welcome " + validUser.name);

// ✅ REDIRECT TO BOOKING PAGE
window.location.href = "booking-appointment.html";

}
else{

alert("Invalid Email or Password");

}

});

</script>

</body>
</html>

</script>

</body>
</html>
